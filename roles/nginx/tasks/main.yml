---
# =============================================================
#  roles/nginx/tasks/main.yml
#  Part 2 – Install & configure Nginx as a reverse proxy
# =============================================================

- name: "NGINX | Install Nginx"
  apt:
    name: nginx
    state: present
    update_cache: yes
  tags: [nginx, deploy]

- name: "NGINX | Ensure Nginx is started and enabled"
  service:
    name: nginx
    state: started
    enabled: yes
  tags: [nginx, deploy]

- name: "NGINX | Remove default Nginx site"
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx
  tags: [nginx, deploy]

- name: "NGINX | Deploy app virtual host config from template"
  template:
    src: app.conf.j2
    dest: "/etc/nginx/sites-available/{{ app_name }}.conf"
    owner: root
    group: root
    mode: '0644'
    validate: "nginx -t -c /etc/nginx/nginx.conf"
  notify: reload nginx
  tags: [nginx, deploy]

- name: "NGINX | Enable app site (create symlink)"
  file:
    src: "/etc/nginx/sites-available/{{ app_name }}.conf"
    dest: "/etc/nginx/sites-enabled/{{ app_name }}.conf"
    state: link
  notify: reload nginx
  tags: [nginx, deploy]

- name: "NGINX | Set nginx.conf worker settings"
  lineinfile:
    path: /etc/nginx/nginx.conf
    regexp: "^worker_processes"
    line: "worker_processes {{ nginx_worker_processes }};"
  notify: reload nginx
  tags: [nginx, deploy]

- name: "NGINX | Ensure Nginx log directory exists"
  file:
    path: "{{ nginx_log_dir }}"
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'
  tags: [nginx, deploy]

- name: "NGINX | Test Nginx configuration"
  command: nginx -t
  register: nginx_test
  changed_when: false
  tags: [nginx, deploy]

- name: "NGINX | Show Nginx test result"
  debug:
    msg: "{{ nginx_test.stderr_lines }}"
  tags: [nginx, deploy]
