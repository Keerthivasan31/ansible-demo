---
# =============================================================
# roles/nginx/tasks/main.yml
# Install and Configure Nginx Reverse Proxy
# =============================================================

- name: "NGINX | Install nginx"
  apt:
    name: nginx
    state: present
    update_cache: yes
  tags: [nginx, deploy]

- name: "NGINX | Ensure nginx service is enabled"
  service:
    name: nginx
    enabled: yes
    state: started
  tags: [nginx, deploy]

- name: "NGINX | Remove default nginx site"
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx
  tags: [nginx, deploy]

- name: "NGINX | Remove default site configuration"
  file:
    path: /etc/nginx/sites-available/default
    state: absent
  notify: reload nginx
  tags: [nginx, deploy]

- name: "NGINX | Deploy application virtual host"
  template:
    src: app.conf.j2
    dest: "/etc/nginx/sites-available/{{ app_name }}.conf"
    owner: root
    group: root
    mode: "0644"
  notify: reload nginx
  tags: [nginx, deploy]

- name: "NGINX | Enable application site"
  file:
    src: "/etc/nginx/sites-available/{{ app_name }}.conf"
    dest: "/etc/nginx/sites-enabled/{{ app_name }}.conf"
    state: link
    force: yes
  notify: reload nginx
  tags: [nginx, deploy]

- name: "NGINX | Test nginx configuration"
  command: nginx -t
  register: nginx_test
  changed_when: false
  tags: [nginx, deploy]

- name: "NGINX | Reload nginx"
  service:
    name: nginx
    state: reloaded
  when: nginx_test.rc == 0
  tags: [nginx, deploy]