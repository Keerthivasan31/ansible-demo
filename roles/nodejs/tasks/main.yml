---
# ============================================================
# roles/nodejs/tasks/main.yml
# ============================================================

- name: Install NodeSource repository
  shell: |
    curl -fsSL https://deb.nodesource.com/setup_18.x | bash -
  args:
    executable: /bin/bash

- name: Install NodeJS
  apt:
    name: nodejs
    state: present
    update_cache: yes

- name: Install build tools
  apt:
    name:
      - build-essential
      - git
    state: present

- name: Install PM2
  npm:
    name: pm2
    global: yes
    state: present

- name: Create application directory
  file:
    path: /opt/myapp
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"

- name: Remove previous application
  file:
    path: /opt/myapp
    state: absent

- name: Recreate application directory
  file:
    path: /opt/myapp
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"

- name: Copy application
  copy:
    src: "{{ playbook_dir }}/myapp/"
    dest: /opt/myapp/
    owner: ubuntu
    group: ubuntu

- name: Remove old node_modules
  file:
    path: /opt/myapp/node_modules
    state: absent

- name: Remove package-lock
  file:
    path: /opt/myapp/package-lock.json
    state: absent
  ignore_errors: yes

- name: Install npm packages
  shell: |
    cd /opt/myapp
    npm install --production
  args:
    executable: /bin/bash
  register: npm_install

- debug:
    var: npm_install.stdout_lines

- debug:
    var: npm_install.stderr_lines

- name: Verify package.json exists
  stat:
    path: /opt/myapp/package.json
  register: packagejson

- fail:
    msg: "package.json not found."
  when: not packagejson.stat.exists

- name: Verify express exists
  shell: |
    cd /opt/myapp
    npm list express
  register: express_check
  failed_when: false

- debug:
    var: express_check.stdout_lines

- name: Deploy env file
  template:
    src: env.j2
    dest: /opt/myapp/.env
    mode: "0600"

- name: Deploy systemd service
  template:
    src: myapp.service.j2
    dest: /etc/systemd/system/myapp.service

- name: Reload systemd
  systemd:
    daemon_reload: yes

- name: Restart service
  systemd:
    name: myapp
    enabled: yes
    state: restarted

- name: Wait for app
  wait_for:
    port: 3000
    timeout: 30

- name: Health Check
  uri:
    url: http://localhost:3000/health
    status_code: 200
  register: health

- debug:
    var: health