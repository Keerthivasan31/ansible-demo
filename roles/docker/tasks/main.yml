---
# =============================================================
# roles/docker/tasks/main.yml
# =============================================================

- name: Remove old Docker packages
  apt:
    name:
      - docker
      - docker-engine
      - docker.io
      - containerd
      - runc
    state: absent
    purge: yes

- name: Remove old Docker repository and keys
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/docker.list
    - /etc/apt/keyrings/docker.gpg

- name: Create apt keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Install required packages
  apt:
    update_cache: yes
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - python3-docker
    state: present

- name: Download Docker GPG key
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /tmp/docker.asc
    mode: "0644"

- name: Convert Docker GPG key
  command:
    cmd: gpg --dearmor -o /etc/apt/keyrings/docker.gpg /tmp/docker.asc
  args:
    creates: /etc/apt/keyrings/docker.gpg

- name: Set permissions on Docker GPG key
  file:
    path: /etc/apt/keyrings/docker.gpg
    mode: "0644"

- name: Add Docker repository
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    filename: docker
    state: present

- name: Update apt cache
  apt:
    update_cache: yes

- name: Install Docker Engine
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present

- name: Start Docker service
  service:
    name: docker
    state: started
    enabled: yes

- name: Add ubuntu user to docker group
  user:
    name: ubuntu
    groups: docker
    append: yes

- name: Docker Hub Login
  community.docker.docker_login:
    username: "kvmax"
    password: "Vasan@3181"
  no_log: true

- name: Pull latest Docker image
  community.docker.docker_image:
    name: "kvmax/task-remainder:latest"
    source: pull

- name: Stop existing container
  community.docker.docker_container:
    name: myapp
    state: stopped
  ignore_errors: yes

- name: Remove existing container
  community.docker.docker_container:
    name: myapp
    state: absent
  ignore_errors: yes

- name: Run Docker container
  community.docker.docker_container:
    name: myapp
    image: "kvmax/task-remainder:latest"
    state: started
    recreate: yes
    restart_policy: always
    pull: false
    ports:
      - "8080:80"