---
# =============================================================
#  roles/docker/tasks/main.yml
#  Part 2 – Install Docker CE on Ubuntu EC2 instances
# =============================================================

- name: "DOCKER | Remove old/conflicting Docker packages"
  apt:
    name:
      - docker
      - docker-engine
      - docker.io
      - containerd
      - runc
    state: absent
  tags: [docker, deploy]

- name: "DOCKER | Install prerequisites"
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: yes
  tags: [docker, deploy]

- name: "DOCKER | Add Docker GPG key"
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present
  tags: [docker, deploy]

- name: "DOCKER | Add Docker repository"
  apt_repository:
    repo: >
      deb [arch=amd64]
      https://download.docker.com/linux/ubuntu
      {{ ansible_distribution_release }} stable
    state: present
    filename: docker
  tags: [docker, deploy]

- name: "DOCKER | Install Docker CE"
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes
  notify: restart docker
  tags: [docker, deploy]

- name: "DOCKER | Ensure Docker service is started and enabled"
  service:
    name: docker
    state: started
    enabled: yes
  tags: [docker, deploy]

- name: "DOCKER | Add ubuntu user to docker group"
  user:
    name: "{{ item }}"
    groups: docker
    append: yes
  loop: "{{ docker_users }}"
  tags: [docker, deploy]

- name: "DOCKER | Configure Docker daemon (logging + storage driver)"
  copy:
    dest: /etc/docker/daemon.json
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "50m",
          "max-file": "3"
        },
        "storage-driver": "overlay2",
        "live-restore": true
      }
    mode: '0644'
  notify: restart docker
  tags: [docker, deploy]

- name: "DOCKER | Verify Docker installation"
  command: docker --version
  register: docker_version_output
  changed_when: false
  tags: [docker, deploy]

- name: "DOCKER | Show Docker version"
  debug:
    msg: "{{ docker_version_output.stdout }}"
  tags: [docker, deploy]
