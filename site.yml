---
# =============================================================
#  site.yml  –  Master Playbook
#  Runs all roles across the [web] group in the correct order.
#  Usage:
#    ansible-playbook site.yml
#    ansible-playbook site.yml --tags "docker,nginx"
#    ansible-playbook site.yml --limit web1
# =============================================================

- name: "PART 1 | Setup – Common baseline for all web servers"
  hosts: web
  become: true
  gather_facts: true
  tags: [setup, common]
  roles:
    - common

- name: "PART 2 | Deployment – Install Docker, Nginx, Node.js and deploy app"
  hosts: web
  become: true
  gather_facts: true
  tags: [deploy, docker, nginx, nodejs]
  roles:
    - docker
    - nodejs
    - nginx

- name: "PART 3 | Security – SSH hardening, UFW firewall, fail2ban, Vault"
  hosts: web
  become: true
  gather_facts: true
  tags: [security, firewall, ssh]
  roles:
    - firewall
    - ssh

- name: "PART 4 | Networking – Multi-host inventory, host groups validation"
  hosts: web
  become: true
  gather_facts: true
  tags: [networking]
  tasks:
    - name: Show all host network facts
      debug:
        msg: |
          Host      : {{ inventory_hostname }}
          Private IP: {{ ansible_default_ipv4.address }}
          Public IP : {{ ansible_host }}
          Group(s)  : {{ group_names | join(', ') }}

- name: "PART 5 | Automation – Tags, scheduled runs, Jenkins-triggered deploy"
  hosts: web
  become: true
  gather_facts: true
  tags: [automation]

  vars:
    build_number: "{{ build_number | default('manual') }}"
    app_version:  "{{ app_version  | default('latest') }}"

  tasks:

    # ── Cron: nightly self-healing re-deploy ─────────────────────
    - name: "AUTO | Ensure nightly cron re-deploy at 2 AM"
      cron:
        name: "ansible-daily-deploy"
        minute: "0"
        hour: "2"
        job: >
          cd /opt/ansible-ec2-project &&
          ansible-playbook site.yml --tags deploy
          >> /var/log/ansible-cron.log 2>&1
        state: present
      tags: [automation, cron]

    # ── Backup dir: ensure present before every Jenkins run ──────
    - name: "AUTO | Ensure backup directory exists"
      file:
        path: /opt/backups
        state: directory
        owner: root
        group: root
        mode: '0750'
      tags: [automation, jenkins]

    # ── Record deployment metadata (Jenkins injects build_number) ─
    - name: "AUTO | Write deployment metadata"
      copy:
        content: |
          build_number={{ build_number }}
          app_version={{ app_version }}
          deploy_time={{ ansible_date_time.iso8601 }}
          deployed_by={{ lookup('env', 'USER') | default('jenkins') }}
          host={{ inventory_hostname }}
        dest: /etc/ansible-last-deploy
        mode: '0644'
      tags: [automation, jenkins]

    # ── Log rotation for ansible-cron.log ────────────────────────
    - name: "AUTO | Ensure logrotate config for ansible cron log"
      copy:
        dest: /etc/logrotate.d/ansible-cron
        content: |
          /var/log/ansible-cron.log {
              weekly
              rotate 4
              compress
              delaycompress
              missingok
              notifempty
          }
        mode: '0644'
      tags: [automation]

    - name: "AUTO | Show automation summary"
      debug:
        msg:
          - "Cron : daily at 02:00 → ansible-playbook site.yml --tags deploy"
          - "Build: #{{ build_number }} | Version: {{ app_version }}"
          - "Host : {{ inventory_hostname }} ({{ ansible_host }})"
      tags: [automation]
