---
# =============================================================
# site.yml - Master Playbook
# =============================================================

- name: "PART 1 | Setup – Common baseline for all web servers"
  hosts: web
  become: true
  gather_facts: true
  tags:
    - setup
    - common

  roles:
    - common

# ------------------------------------------------------------

- name: "PART 2 | Deployment – Install Docker, Node.js and Nginx"
  hosts: web
  become: true
  gather_facts: true
  tags:
    - deploy
    - docker
    - nodejs
    - nginx

  roles:
    - docker
    - nodejs
    - nginx

# ------------------------------------------------------------

- name: "PART 3 | Security – Firewall, SSH and Fail2Ban"
  hosts: web
  become: true
  gather_facts: true
  tags:
    - security
    - firewall
    - ssh

  roles:
    - firewall
    - ssh

# ------------------------------------------------------------

- name: "PART 4 | Networking Information"
  hosts: web
  become: true
  gather_facts: true
  tags:
    - networking

  tasks:

    - name: Show host information
      debug:
        msg:
          - "Hostname  : {{ inventory_hostname }}"
          - "Private IP: {{ ansible_default_ipv4.address }}"
          - "Public IP : {{ ansible_host }}"
          - "Groups     : {{ group_names | join(', ') }}"

# ------------------------------------------------------------

- name: "PART 5 | Automation"
  hosts: web
  become: true
  gather_facts: true
  tags:
    - automation

  vars:

    # Jenkins automatically exports BUILD_NUMBER
    deployment_build_number: "{{ lookup('env','BUILD_NUMBER') | default('manual', true) }}"

    # Optional environment variable
    deployment_app_version: "{{ lookup('env','APP_VERSION') | default('latest', true) }}"

  tasks:

    - name: AUTO | Ensure nightly cron deployment
      cron:
        name: ansible-daily-deploy
        minute: "0"
        hour: "2"
        job: >
          cd /home/ubuntu/ansible-demo &&
          ansible-playbook site.yml --tags deploy >>
          /var/log/ansible-cron.log 2>&1
        state: present

    - name: AUTO | Ensure backup directory exists
      file:
        path: /opt/backups
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: AUTO | Write deployment metadata
      copy:
        dest: /etc/ansible-last-deploy
        mode: "0644"
        content: |
          Build Number : {{ deployment_build_number }}
          Version      : {{ deployment_app_version }}
          Deploy Time  : {{ ansible_date_time.iso8601 }}
          User         : {{ lookup('env','USER') | default('ubuntu', true) }}
          Host         : {{ inventory_hostname }}
          Public IP    : {{ ansible_host }}

    - name: AUTO | Configure logrotate
      copy:
        dest: /etc/logrotate.d/ansible-cron
        mode: "0644"
        content: |
          /var/log/ansible-cron.log {
              weekly
              rotate 4
              compress
              delaycompress
              missingok
              notifempty
          }

    - name: AUTO | Display deployment summary
      debug:
        msg:
          - "Deployment completed successfully"
          - "Build Number : {{ deployment_build_number }}"
          - "Application  : {{ deployment_app_version }}"
          - "Host         : {{ inventory_hostname }}"
          - "Public IP    : {{ ansible_host }}"